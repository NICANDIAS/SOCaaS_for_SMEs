name: socaas_for_smes
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.2
    #container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    # Apple Silicon is fine; if you ever hit arch issues, uncomment:
    # platform: linux/arm64

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.2
    #container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    # platform: linux/arm64

  wazuh-manager:
    image: wazuh/wazuh-manager:4.13.0
    # command: [
    #     "/bin/sh",
    #     "-lc",
    #     "mkdir -p /etc/services.d/filebeat /etc/services.d/indexer-connector && \
    #     : > /etc/services.d/filebeat/down && \
    #     : > /etc/services.d/indexer-connector/down && \
    #     /entrypoint.sh",
    #   ]
    ports:
      - "1514:1514" # TCP
      - "1514:1514/udp" # (optional) UDP
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_data:/var/ossec/data
      - wazuh_logs:/var/ossec/logs
      - ./wazuh-mask/filebeat:/etc/services.d/filebeat
      - ./wazuh-mask/indexer-connector:/etc/services.d/indexer-connector
      - ./ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./local_rules.xml:/var/ossec/etc/rules/local_rules.xml
      - ./tigarsec-fintech-rules.xml:/var/ossec/etc/rules/tigarsec-fintech-rules.xml
      - ./tigarsec-healthcare-rules.xml:/var/ossec/etc/rules/tigarsec-healthcare-rules.xml
      - ./tigarsec-legal-rules.xml:/var/ossec/etc/rules/tigarsec-legal-rules.xml
    networks:
      - socaas

  wazuh-filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.2
    #container_name: wazuh-filebeat
    depends_on:
      - wazuh-manager
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./infrastructure/beats/wazuh-filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - wazuh_logs:/var/ossec/logs:ro

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - socaas

  cassandra:
    image: cassandra:4.1
    container_name: thehive-cassandra
    environment:
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
    volumes:
      - thehive-cassandra-data:/var/lib/cassandra
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1 || exit 1"]
      start_period: 90s
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - socaas

  thehive:
    image: strangebee/thehive:5.3
    container_name: thehive
    depends_on:
      cassandra:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - CQL_HOSTNAMES=cassandra
      - CQL_PORT=9042
      - SECRET=changeme-super-secret-key
      - APPLICATION_SECRET=changeme-super-secret-key
    volumes:
      - thehive_files:/opt/thp/thehive/files
    restart: unless-stopped
    networks:
      - socaas

volumes:
  esdata:
    name: socaas_for_smes_esdata
  wazuh_data:
    name: socaas_for_smes_wazuh_data
  wazuh_logs:
    name: socaas_for_smes_wazuh_logs
  n8n_data:
    name: socaas_for_smes_n8n_data
  thehive-cassandra-data:
    name: socaas_for_smes_thehive-cassandra-data
  thehive_files:
    name: socaas_for_smes_thehive_files

networks:
  socaas:
    driver: bridge
