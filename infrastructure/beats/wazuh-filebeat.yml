filebeat.inputs:
  - type: filestream
    id: wazuh-alerts
    paths: ["/var/ossec/logs/alerts/alerts.json"]
    parsers:
      - ndjson: {}

processors:
  - add_fields:
      target: event
      fields:
        module: wazuh

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"

setup.ilm.enabled: false