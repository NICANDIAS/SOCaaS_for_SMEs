# ══════════════════════════════════════════════════════════
# TIGARSEC SOCaaS — Central Reverse Proxy
# Local: soc.local:8080 (Kibana), soc.local:5679 (n8n), soc.local:9001 (TheHive)
# Production: replace server_name with your real domain
# ══════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {

    # ── Kibana: subpath under port 80 ──
    server {
        listen 80;
        server_name soc.local localhost;

        # ── SOC Portal (landing page) ──
        location = / {
            root /etc/nginx/html;
            try_files /index.html =404;
        }

        location = /index.html {
            root /etc/nginx/html;
        }

        location /kibana/ {
            proxy_pass http://kibana:5601;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── n8n webhook endpoint (Wazuh alerts + testing) ──
        location /webhook/ {
            proxy_pass http://n8n:5678/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── n8n: dedicated port, served from root ──
    server {
        listen 5679;
        server_name soc.local localhost;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── TheHive: dedicated port, served from root ──
    server {
        listen 9001;
        server_name soc.local localhost;

        location / {
            proxy_pass http://thehive:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}