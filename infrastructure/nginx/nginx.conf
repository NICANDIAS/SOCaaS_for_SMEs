# ══════════════════════════════════════════════════════════
# TIGARSEC SOCaaS — Central Reverse Proxy
# Local dev: soc.local / thehive.soc.local (add to /etc/hosts)
# Production: replace server_name values with your real subdomains
# ══════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {

    # ── Main entry point: Kibana + n8n under subpaths ──
    server {
        listen 80;
        server_name soc.local localhost;

        location = / {
            return 200 'TIGARSEC SOCaaS - services: /kibana /n8n  (TheHive: port 9001)';
            add_header Content-Type text/plain;
        }

        location /kibana/ {
            proxy_pass http://kibana:5601;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── TheHive: own subdomain, served from root ──
    server {
        listen 9001;
        server_name soc.local localhost;

        location / {
            proxy_pass http://thehive:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}